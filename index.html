<!DOCTYPE html>
<html>
<head>
<title>Nexora 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* LOGIN PAGE */
.loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* APP PAGE */
.app{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.content{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.bottomNav{
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px 0;
}

.navItem{
  text-align:center;
  cursor:pointer;
  font-size:14px;
}

.memberCard, .chatBubble{
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.chatBubble{
  width:fit-content;
}

.inputBox{
  display:flex;
  padding:10px;
  background:#1e293b;
}

.inputBox input{
  flex:1;
  margin-right:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginPage" id="loginPage">
  <div class="card">
    <h2>Nexora</h2>
    <input id="name" placeholder="Your name">
    <input id="code" placeholder="College Code">
    <select id="course">
      <option value="">Select Course</option>
      <option>CS</option>
      <option>CSE</option>
      <option>AI-DS</option>
      <option>DS</option>
      <option>IT</option>
      <option>AI-ML</option>
    </select>
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header" id="headerTitle">Members</div>

  <div class="content" id="content"></div>

  <div class="inputBox" id="chatInputBox" style="display:none;">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="bottomNav">
    <div class="navItem" onclick="showMembers()">👥<br>Members</div>
    <div class="navItem" onclick="showRequests()">📩<br>Requests</div>
    <div class="navItem" onclick="showChats()">💬<br>Chats</div>
    <div class="navItem" onclick="showSettings()">⚙<br>Settings</div>
  </div>

</div>

<script>

let currentUser = "";
let currentCourse = "";
let activeChatUser = "";

function login(){
  const name = document.getElementById("name").value;
  const code = document.getElementById("code").value;
  const course = document.getElementById("course").value;

  if(name==="" || code!=="1234" || course===""){
    alert("Invalid details!");
    return;
  }

  currentUser = name;
  currentCourse = course;

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push({name, course});
  localStorage.setItem("users", JSON.stringify(users));

  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="flex";

  showMembers();
}

/* MEMBERS */
function showMembers(){
  document.getElementById("headerTitle").innerText="Members";
  document.getElementById("chatInputBox").style.display="none";

  const content = document.getElementById("content");
  content.innerHTML="";

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.forEach(u=>{
    if(u.course===currentCourse && u.name!==currentUser){
      content.innerHTML+=`
        <div class="memberCard">
          ${u.name} (${u.course})
          <button onclick="sendRequest('${u.name}')">Request</button>
        </div>
      `;
    }
  });
}

/* REQUESTS */
function showRequests(){
  document.getElementById("headerTitle").innerText="Requests";
  document.getElementById("chatInputBox").style.display="none";
  document.getElementById("content").innerHTML="Demo Requests UI";
}

function sendRequest(name){
  alert("Request sent to "+name+" (Frontend demo)");
}

/* CHATS */
function showChats(){
  document.getElementById("headerTitle").innerText="Chats";
  document.getElementById("content").innerHTML="Select a member to chat.";
  document.getElementById("chatInputBox").style.display="flex";
}

function sendMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value;
  if(text==="") return;

  const bubble = document.createElement("div");
  bubble.className="chatBubble";
  bubble.innerText=currentUser+": "+text;

  document.getElementById("content").appendChild(bubble);
  input.value="";
}

/* SETTINGS */
function showSettings(){
  document.getElementById("headerTitle").innerText="Settings";
  document.getElementById("chatInputBox").style.display="none";
  document.getElementById("content").innerHTML=`
    <div class="memberCard">
      Logged in as: ${currentUser}<br>
      Course: ${currentCourse}
    </div>
  `;
}

</script>
</body>
</html>
