<!DOCTYPE html>
<html>
<head>
<title>Nexora 2.0 - Student Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
}

/* LOGIN */
.loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.card{
  background:#1e293b;
  padding:40px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{background:#4f46e5}

/* APP */
.app{
  display:none;
  flex-direction:column;
  height:100vh;
}

.header{
  background:#1e293b;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #334155;
}

.logoutBtn{
  background:#ef4444;
  padding:6px 12px;
  border-radius:6px;
  font-size:12px;
}

.content{
  flex:1;
  overflow:auto;
  padding:15px;
}

.searchBar{
  margin-bottom:15px;
}

.searchBar input{
  margin:0;
}

.memberCard{
  background:#334155;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.memberName{font-weight:bold}

.emptyState{
  text-align:center;
  color:#94a3b8;
  margin-top:40px;
}

.bottomNav{
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px 0;
  border-top:1px solid #334155;
}

.navItem{
  cursor:pointer;
  font-size:12px;
  text-align:center;
  flex:1;
}

.navItem.active{
  background:#6366f1;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginPage" id="loginPage">
  <div class="card">
    <h2>Nexora</h2>
    <input id="name" placeholder="Enter name">
    <input id="code" placeholder="College code">
    <button onclick="login()">Enter Nexora</button>
    <p id="error" style="color:red;font-size:12px;"></p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div class="header">
    <div id="headerTitle">Members</div>
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>

  <div class="content" id="content"></div>

  <div class="bottomNav">
    <div class="navItem active" onclick="showMembers()">👥<br>Members</div>
    <div class="navItem" onclick="showSettings()">⚙️<br>Settings</div>
  </div>

</div>

<script>

let currentUser=""
let allUsers=[]

function init(){
  allUsers=JSON.parse(localStorage.getItem("users"))||[]
}

function login(){
  init()
  const name=document.getElementById("name").value.trim()
  const code=document.getElementById("code").value.trim()
  if(name==""||code==""){
    document.getElementById("error").innerText="Fill all fields"
    return
  }
  if(code!=="1234"){
    document.getElementById("error").innerText="Invalid code (1234)"
    return
  }

  let user=allUsers.find(u=>u.name.toLowerCase()==name.toLowerCase())
  if(!user){
    user={id:Date.now(),name:name,joined:new Date()}
    allUsers.push(user)
    localStorage.setItem("users",JSON.stringify(allUsers))
  }

  currentUser=name
  document.getElementById("loginPage").style.display="none"
  document.getElementById("app").style.display="flex"
  showMembers()
}

function logout(){
  currentUser=""
  document.getElementById("loginPage").style.display="flex"
  document.getElementById("app").style.display="none"
}

function showMembers(){
  updateNav(0)
  const content=document.getElementById("content")
  content.innerHTML=`
    <div class="searchBar">
      <input type="text" id="searchInput" placeholder="Search members..." onkeyup="filterMembers()">
    </div>
    <div id="membersList"></div>
  `
  renderMembers("")
}

function renderMembers(filter){
  const list=document.getElementById("membersList")
  const members=allUsers.filter(u=>u.name!==currentUser)
        .filter(u=>u.name.toLowerCase().includes(filter.toLowerCase()))

  if(members.length==0){
    list.innerHTML='<div class="emptyState">No users found</div>'
    return
  }

  list.innerHTML=""
  members.forEach(m=>{
    list.innerHTML+=`
      <div class="memberCard">
        <div>
          <div class="memberName">${m.name}</div>
        </div>
      </div>
    `
  })
}

function filterMembers(){
  const value=document.getElementById("searchInput").value
  renderMembers(value)
}

function showSettings(){
  updateNav(1)
  const content=document.getElementById("content")
  const user=allUsers.find(u=>u.name==currentUser)
  content.innerHTML=`
    <div class="memberCard">
      <div>
        <div class="memberName">${user.name}</div>
        <div style="font-size:12px;color:#94a3b8;">Joined: ${new Date(user.joined).toLocaleDateString()}</div>
      </div>
    </div>
  `
}

function updateNav(index){
  const items=document.querySelectorAll(".navItem")
  items.forEach(i=>i.classList.remove("active"))
  items[index].classList.add("active")
}

init()
</script>

</body>
</html>
