<!DOCTYPE html>
<html>
<head>
<title>Nexora 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI}

body{background:#0f172a;color:white;transition:0.3s}
body.light{background:#f1f5f9;color:#111}

.loginPage{
display:flex;justify-content:center;align-items:center;height:100vh}

.card{
background:#1e293b;padding:25px;border-radius:12px;width:95%;max-width:400px}

body.light .card{background:white}

input,select{
width:100%;padding:10px;margin-bottom:12px;border-radius:6px;
border:1px solid #334155}

button{
padding:8px 12px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}

.primary{background:#6366f1;color:white}
.success{background:#10b981;color:white}
.danger{background:#ef4444;color:white}
.gray{background:#64748b;color:white}

.app{display:none;flex-direction:column;height:100vh}

.header{
background:#1e293b;padding:12px;display:flex;
justify-content:space-between;align-items:center}

body.light .header{background:#e2e8f0}

.content{flex:1;overflow:auto;padding:15px}

.bottomNav{display:flex;background:#1e293b}
body.light .bottomNav{background:#e2e8f0}

.navItem{flex:1;text-align:center;padding:10px;cursor:pointer}
.navItem.active{background:#6366f1;color:white}

.memberCard{
background:#334155;padding:12px;border-radius:8px;
margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

body.light .memberCard{background:#cbd5e1}

.profilePic{
width:40px;height:40px;border-radius:50%;object-fit:cover;margin-right:10px}

.row{display:flex;align-items:center}

.searchBar input{margin-bottom:15px}

.empty{text-align:center;margin-top:30px;color:gray}
  /* CHAT SYSTEM */

.chatBox{
position:fixed;
bottom:70px;
right:20px;
width:300px;
height:350px;
background:#1e293b;
border-radius:10px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.chatMessages{
flex:1;
padding:10px;
overflow-y:auto;
font-size:14px;
}

.chatInputArea{
display:flex;
padding:8px;
background:#334155;
}

.chatInputArea input{
flex:1;
margin:0;
border:none;
padding:8px;
border-radius:5px;
}

.chatInputArea button{
margin-left:5px;
}

.emojiPanel{
display:none;
padding:5px;
background:#475569;
font-size:18px;
cursor:pointer;
}

.emojiPanel span{
margin:4px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="loginPage" id="loginPage">
<div class="card">
<h2>Nexora</h2><br>
<input id="name" placeholder="Enter Name">
<input id="code" placeholder="College Code (1234)">
<select id="course">
<option value="">Select Course</option>
<option>CS</option>
<option>CSE</option>
<option>AI-DS</option>
<option>IT</option>
<option>AI-ML</option>
</select>
<button class="primary" onclick="login()">Login</button>
<p id="error" style="color:red;margin-top:10px"></p>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="header">
<div id="headerTitle">Members</div>
<div>
<button class="gray" onclick="toggleTheme()">Theme</button>
<button class="danger" onclick="logout()">Logout</button>
</div>
</div>

<div class="content" id="content"></div>

<div class="bottomNav">
<div class="navItem active" onclick="showMembers()">Members</div>
<div class="navItem" onclick="showRequests()">Requests</div>
<div class="navItem" onclick="showProfile()">Profile</div>
</div>

</div>
<!-- CHAT BOX -->
<div class="chatBox" id="chatBox" style="display:none">

<div class="chatMessages" id="chatMessages"></div>

<div class="emojiPanel" id="emojiPanel">
<span onclick="addEmoji('😀')">😀</span>
<span onclick="addEmoji('😂')">😂</span>
<span onclick="addEmoji('😍')">😍</span>
<span onclick="addEmoji('😎')">😎</span>
<span onclick="addEmoji('🔥')">🔥</span>
<span onclick="addEmoji('👍')">👍</span>
</div>

<div class="chatInputArea">
<button onclick="toggleEmoji()">😀</button>
<input id="chatInput" placeholder="Type message">
<button onclick="sendChat()">Send</button>
</div>

</div>
<script>

let currentUserId=null
let users=[]
let requests={}

function init(){
users=JSON.parse(localStorage.getItem("nx_users"))||[]
requests=JSON.parse(localStorage.getItem("nx_requests"))||{}
}

function saveData(){
localStorage.setItem("nx_users",JSON.stringify(users))
localStorage.setItem("nx_requests",JSON.stringify(requests))
}

function login(){
init()
const name=document.getElementById("name").value.trim()
const code=document.getElementById("code").value.trim()
const course=document.getElementById("course").value

if(name==""||code!="1234"||course==""){
document.getElementById("error").innerText="Fill all details correctly"
return
}

let user=users.find(u=>u.name.toLowerCase()==name.toLowerCase())

if(!user){
user={
id:Date.now(),
name:name,
course:course,
joined:new Date(),
photo:""
}
users.push(user)
}

currentUserId=user.id

if(!requests[user.id]) requests[user.id]={sent:[],received:[]}

saveData()

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="flex"

showMembers()
}

function logout(){
currentUserId=null
document.getElementById("loginPage").style.display="flex"
document.getElementById("app").style.display="none"
}

function showMembers(){
setActive(0)
document.getElementById("headerTitle").innerText="Members"

const content=document.getElementById("content")
content.innerHTML=`
<div class="searchBar">
<input type="text" id="searchInput" placeholder="Search users..." onkeyup="renderMembers()">
</div>
<div id="membersList"></div>
`
renderMembers()
}

function renderMembers(){
const filter=document.getElementById("searchInput").value.toLowerCase()
const list=document.getElementById("membersList")
list.innerHTML=""

users
.filter(u=>u.id!=currentUserId)
.filter(u=>u.name.toLowerCase().includes(filter))
.forEach(u=>{
list.innerHTML+=`
<div class="memberCard">
<div class="row">
${u.photo?`<img src="${u.photo}" class="profilePic">`:``}
<div>
<div><b>${u.name}</b></div>
<div style="font-size:12px">${u.course}</div>
</div>
</div>
<button class="primary" onclick="sendRequest(${u.id})">Add</button>
</div>
`
})

if(list.innerHTML==""){
list.innerHTML='<div class="empty">No users found</div>'
}
}

function sendRequest(id){
requests[currentUserId].sent.push(id)
requests[id].received.push(currentUserId)
saveData()
alert("Request sent")
}

function showRequests(){
setActive(1)
document.getElementById("headerTitle").innerText="Requests"

const content=document.getElementById("content")
const myReq=requests[currentUserId]

if(myReq.received.length==0){
content.innerHTML='<div class="empty">No requests</div>'
return
}

content.innerHTML=""

myReq.received.forEach(id=>{
const user=users.find(u=>u.id==id)
content.innerHTML+=`
<div class="memberCard">
<div>${user.name}</div>
<button class="success" onclick="acceptRequest(${id})">Accept</button>
</div>
`
})
}

function acceptRequest(id){
requests[currentUserId].received=
requests[currentUserId].received.filter(r=>r!=id)
saveData()
alert("Friend Added")
showRequests()
}

function showProfile(){
setActive(2)
document.getElementById("headerTitle").innerText="Profile"

const user=users.find(u=>u.id==currentUserId)

document.getElementById("content").innerHTML=`
<div class="memberCard">
<div>
<h3>${user.name}</h3>
<p>Course: ${user.course}</p>
<p>Joined: ${new Date(user.joined).toLocaleDateString()}</p>
<br>
<input type="file" onchange="uploadPhoto(event)">
</div>
</div>
`
}

function uploadPhoto(e){
const file=e.target.files[0]
const reader=new FileReader()
reader.onload=function(){
const user=users.find(u=>u.id==currentUserId)
user.photo=reader.result
saveData()
alert("Photo updated")
}
reader.readAsDataURL(file)
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function setActive(i){
document.querySelectorAll(".navItem").forEach(n=>n.classList.remove("active"))
document.querySelectorAll(".navItem")[i].classList.add("active")
}

init()
  /* CHAT FUNCTIONS */

let chats = JSON.parse(localStorage.getItem("nx_chats")) || []

function openChat(){
document.getElementById("chatBox").style.display="flex"
renderChat()
}

function sendChat(){
const input=document.getElementById("chatInput")
const msg=input.value.trim()

if(msg=="") return

chats.push({
user:currentUserId,
text:msg,
time:Date.now()
})

localStorage.setItem("nx_chats",JSON.stringify(chats))
input.value=""
renderChat()
}

function renderChat(){
const box=document.getElementById("chatMessages")
box.innerHTML=""

chats.forEach(c=>{
box.innerHTML+=`<div><b>${c.user}</b>: ${c.text}</div>`
})

box.scrollTop=box.scrollHeight
}

function toggleEmoji(){
const panel=document.getElementById("emojiPanel")
panel.style.display=panel.style.display=="block"?"none":"block"
}

function addEmoji(e){
document.getElementById("chatInput").value+=e
}
</script>
</body>
</html>
